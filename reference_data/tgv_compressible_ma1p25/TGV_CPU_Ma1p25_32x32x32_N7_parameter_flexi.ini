! =============================================================================== !
! OUTPUT
! =============================================================================== !
ProjectName         = TGV_Re1600
Logging             = F
outputFormat        = 0             ! =0, no visu, >0 visualize
WriteErrorFiles     = F
doPrintStatusLine   = F
WriteStateFiles     = F             ! Write HDF5 state files. Disable this only for debugging issues.  
                                    ! NO SOLUTION WILL BE WRITTEN!  

! =============================================================================== !
! INTERPOLATION
! =============================================================================== !
N                   = 7             ! Polynomial degree
GeometricNGeo       = 1             ! Degree of mesh representation
NAnalyze            = 10            ! Number of analyze points10
NVisu               = 12

! =============================================================================== !
! FV-Subcell
! =============================================================================== !
FV_LimiterType        = 1       !  minmod
FV_alpha_min          = 0.00001 ! Lower bound for alpha (all elements below threshold are treated as pure DG)  
FV_alpha_max          = 0.001   ! Maximum value for alpha  
FV_alpha_ExtScale     = 0.5     ! Scaling factor for elpha if extended into neighboring elements  
FV_nExtendAlpha       = 1       ! Number of times alpha should be passed to neighbor elements per timestep  
FV_doExtendAlpha      = F       ! Blending factor is prolongated into neighboring elements 
!=========================================================================================
! Riemann
!=========================================================================================
Riemann             = LF ! Riemann solver to be used: LF, HLLC, Roe,
                                    ! RoeEntropyFix, HLL, HLLE, HLLEM
! =============================================================================== !
! MESH
! =============================================================================== !
MeshFile            = CART_HEX_PERIODIC_032_mesh.h5
useCurveds          = F
! =============================================================================== !
! EQUATION
! =============================================================================== !
IniExactFunc        = 0
IniRefState         = 1
RefState            = (/1.,1.,0.,0.,17194.8345650329/)
Mu0                 = 6.25E-04      ! viscosity set to 1/Re
R                   = 0.457142857
MachNumber          = 1.25
IniConstDens        = F
nWriteStats         = 100
nAnalyzeTestCase    = 40
! =============================================================================== !
! TIMEDISC
! =============================================================================== !
tend                = 20            ! End time, time unit is viscous time: l/u_tau
CFLscale            = 0.5           ! Scaling of theoretical CFL number
DFLscale            = 0.5           ! Scaling of theoretical DFL number

! =============================================================================== !
! ANALYZE
! =============================================================================== !
Analyze_dt          = 0.5           ! Timestep of analyze outputs
CalcErrorNorms      = F             ! Calculate error norms
CalcBodyForces      = F             ! Calculate body forces (BC 4/9)
CalcWallVelocity    = F             ! Calculate velocities at the walls (BC 4/9)
